name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  logic:
    name: Logic tests (Node, no browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Zero dependencies: reads index.html, runs the page's engine in a vm sandbox.
      - name: Run Node logic tests
        run: node --test tests/engine.test.mjs

  browser:
    name: Browser tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # visual.spec.js is intentionally excluded: its pixel baselines are
      # OS/browser-specific, so they are generated locally rather than in CI.
      - name: Behavioral + accessibility tests
        run: npx playwright test tests/ui.spec.js tests/a11y.spec.js

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  snippets:
    name: Build & run cumulative snippet programs (7 languages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@stable
      # Extracts fragments from index.html, merges them in page/dependency
      # order into one program per language, then runs asserting drivers.
      - name: Build and run cumulative snippet programs
        run: bash tools/run-snippets.sh
